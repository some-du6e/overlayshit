{% extends "base.html" %}

{% block title %}Overlaying{% endblock %}

{% block content %}
<section class="min-h-[70vh] flex items-center justify-center px-4 text-white">
    <form
        action="/overlay/multi"
        method="post"
        enctype="multipart/form-data"
        class="w-full max-w-md border border-gray-700 bg-gray-900 p-6 rounded-lg flex flex-col gap-4"
    >
        <div>
            <h1 class="text-2xl font-bold">send ur image</h1>
            <p class="text-gray-400 mt-1">wait a bit mate it takes a while pls</p>
        </div>

        <input type="hidden" name="overlays" value="all">

        <label class="flex flex-col gap-2">
            <span class="text-sm text-gray-300">Image</span>
            <input
                type="file"
                name="base"
                accept="image/*"
                required
                class="block w-full text-sm text-gray-300 file:mr-4 file:rounded-md file:border-0 file:bg-blue-500 file:px-4 file:py-2 file:text-white hover:file:bg-blue-600"
            >
        </label>

        <button
            type="submit"
            class="rounded-md bg-blue-500 px-4 py-2 font-semibold text-white hover:bg-blue-600"
        >
            Overlay it
        </button>
    </form>
</section>
{% endblock %}
